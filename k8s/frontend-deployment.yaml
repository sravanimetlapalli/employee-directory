apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: employee-directory
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: acremployeedirdev.azurecr.io/employee-frontend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        
        # restarts the pod if unhealthy
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        # serves traffic when ready
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      

