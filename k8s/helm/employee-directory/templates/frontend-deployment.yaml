apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: frontend
    environment: {{ .Values.global.environment }}
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        environment: {{ .Values.global.environment }}
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.image.registry }}/{{ .Values.image.frontendRepo }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
        
        # restarts the pod if unhealthy
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: {{ .Values.probes.frontend.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.frontend.liveness.periodSeconds }}
          failureThreshold: 3
        # serves traffic when ready
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: {{ .Values.probes.frontend.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.frontend.readiness.periodSeconds }}
          failureThreshold: 3
        resources:
          requests:
            memory: {{ .Values.resources.frontend.requests.memory | quote }}
            cpu: {{ .Values.resources.frontend.requests.cpu | quote }}
          limits:
            memory: {{ .Values.resources.frontend.limits.memory | quote }}
            cpu: {{ .Values.resources.frontend.limits.cpu | quote }}

